<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Street Light</title>

    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body{
            width: 100%;
            min-height: 100vh;
            display: grid;
            place-content: center;
            padding: 20px;
            background: black;
            /* background-image: linear-gradient(205deg, #4b6cb7 10%, #182848 90%); */
        }
        div{
            background: black;
            width: 100%;
            max-width: 250px;
            border-radius: 10px;
            overflow: hidden;
        }
        img{
            width: 100%;
            display: block;
            object-fit: cover;
        }
       button{
        padding: 5px;
        margin: 5px;
        border-radius: 5px;
        font-size: 15px;
        font-weight: bold;
        border: none;
        color: whi;
        /* border: 2px solid rgb(34, 223, 34); */
        background-image: linear-gradient(205deg, #82c91e 5%, #3bc9db 95%);
       }
        @media (max-width: 480px){

            div{
                max-width: 90vw;
            }
            img{
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div>
        <img src="lightoff.png" alt="">
    </div>
        <button >Turn On</button>
       <script>
    let btn = document.querySelector("button");

  btn.addEventListener("click",()=>{
    const audio = new Audio('soundeff.mp3');
    audio.play();
    let image1 = document.querySelector("img");
    if(btn.innerText == "Turn On"){
        btn.innerText = "Turn Off";
       image1.src = "lighton.png";
    //    btn.style.border = '2px solid red'
    btn.style.backgroundImage = 'linear-gradient(205deg, #e64980 5%, #ff8787 95%)'
    }else{
        btn.innerText = "Turn On";
         image1.src = "lightoff.png";
        //  btn.style.border = '2px solid rgb(34, 223, 34)'
           btn.style.backgroundImage = 'linear-gradient(205deg, #82c91e 5%, #3bc9db 95%)'

    }
    });
</script>
</body>
</html>
